{% extends "base.html" %}

{% block title %}Carol Semijoias | Atualizar Produto{% endblock %}

{% block extra_css %}
<style>
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 32px;
    color: #fff;
  }

  .form-wrap {
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #555;
  }

  input {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color .15s;
  }

  input:focus { border-color: #555; }
  input::placeholder { color: #3a3a3a; }

  .btn-submit {
    margin-top: 8px;
    padding: 10px 20px;
    background: #fff;
    color: #111;
    border: none;
    border-radius: 4px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    align-self: flex-start;
    transition: opacity .15s;
  }

  .btn-submit:hover { opacity: .85; }

  .btn-voltar {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #555;
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 28px;
    transition: color .15s;
  }

  .btn-voltar:hover { color: #e0e0e0; }
</style>
{% endblock %}

{% block content %}
  <a href="{% url 'sales:maleta_produtos' maleta.id %}" class="btn-voltar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Voltar
  </a>

  <h1>Atualizar produto</h1>

  {% load l10n %} <form method="post" class="form-wrap">
    {% csrf_token %}

    <div class="field">
      <label for="product_name">Nome do produto</label>
      <input type="text" id="product_name" name="product_name" value="{{ form.product_name.value|default:'' }}" placeholder="Ex: Anel prata" required>
    </div>

    <div class="field">
      <label for="product_code">Código do produto</label>
      <input type="number" id="product_code" name="product_code" value="{{ form.product_code.value|default:'' }}" placeholder="Ex: 1001" required>
    </div>

    <div class="field">
      <label for="product_value">Valor</label>
      <input type="number" id="product_value" name="product_value" value="{{ form.product_value.value|unlocalize|default:'' }}" placeholder="Ex: 49.90" step="0.01" required>
    </div>

    <div class="field">
      <label for="product_quantity">Quantidade</label>
      <input type="number" id="product_quantity" name="product_quantity" value="{{ form.product_quantity.value|default:'' }}" placeholder="Ex: 10" required>
    </div>

    <div class="field">
      <label for="quantity_sold">Quantidade vendida</label>
      <input type="number" id="quantity_sold" name="quantity_sold" value="{{ form.quantity_sold.value|default:'' }}" placeholder="Ex: 10" required>
    </div>

    <button type="submit" class="btn-submit">Salvar</button>
  </form>
{% endblock %}
