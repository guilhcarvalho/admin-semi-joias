{% extends "base.html" %}

{% block title %}Carol Semijoias | Atualizar Maleta{% endblock %}

{% block extra_css %}
<style>
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 32px;
    color: #fff;
  }

  .form-wrap {
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #555;
  }

  input {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color .15s;
  }

  input:focus { border-color: #555; }
  input::placeholder { color: #3a3a3a; }

  .btn-submit {
    margin-top: 8px;
    padding: 10px 20px;
    background: #fff;
    color: #111;
    border: none;
    border-radius: 4px;
    font-family: 'Segoe UI', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    align-self: flex-start;
    transition: opacity .15s;
  }

  .btn-submit:hover { opacity: .85; }

  .btn-voltar {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #555;
    text-decoration: none;
    font-size: 13px;
    margin-bottom: 28px;
    transition: color .15s;
  }

  .btn-voltar:hover { color: #e0e0e0; }
</style>
{% endblock %}

{% block content %}
  <a href="{% url 'sales:info_maleta' maleta.id %}" class="btn-voltar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Voltar
  </a>

  <h1>Atualizar maleta</h1>

  <form method="post" class="form-wrap">
    {% csrf_token %}

    <div class="field">
      <label for="month">Mês</label>
      <select id="month" name="month" required style="background: #1a1a1a; border: 1px solid #2a2a2a; color: #e0e0e0; padding: 10px; border-radius: 4px;">
        {% for value, text in form.fields.month.choices %}
          <option value="{{ value }}">{{ text }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="field">
      <label for="order_number">Número da ordem</label>
      <input type="text" id="order_number" name="order_number" placeholder="Número da ordem" required>
    </div>

    <div class="field">
      <label for="order_value">Valor da ordem</label>
      <input type="text" id="order_value" name="order_value" placeholder="Valor da ordem" maxlength="11" required>
    </div>

    <div class="field">
      <label for="start_sale_period">Início do período de venda</label>
      <input type="date" id="start_sale_period" name="start_sale_period" required>
    </div>

    <div class="field">
      <label for="end_sale_period">Fim do periodo de venda</label>
      <input type="date" id="end_sale_period" name="end_sale_period" required>
    </div>

    <button type="submit" class="btn-submit">Salvar</button>
  </form>
{% endblock %}
